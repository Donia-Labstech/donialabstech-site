name: Build Blog Manifest

# Rebuilds blog/index.json — the lightweight list the homepage reads to show
# article cards. This does NOT generate articles; it only indexes the real
# pages already published into blog/*.html by the existing daily automation.
on:
  push:
    paths:
      - 'blog/*.html'
  schedule:
    - cron: '30 18 * * *'   # safety net: 30 min after the daily post is expected
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build manifest from blog/*.html
        run: python scripts/build_blog_manifest.py

      - name: Commit and push blog/index.json
        run: |
          git config user.name "DONIA Blog Bot"
          git config user.email "bot@donialabstech.online"
          git add blog/index.json
          git diff --quiet --cached || git commit -m "🔄 تحديث فهرس المدونة (blog/index.json)"
          git push
