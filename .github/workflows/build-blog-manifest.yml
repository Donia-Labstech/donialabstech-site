name: Build Blog Manifest + Sitemap + RSS

on:
  push:
    paths:
      - 'blog/*.html'
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build manifest (with dedup + SEO injection)
        run: python scripts/build_blog_manifest.py

      - name: Build sitemap.xml
        run: python scripts/build_sitemap.py

      - name: Build RSS feed
        run: python scripts/build_rss_feed.py

      - name: Commit & push
        run: |
          git config user.name "DONIA Blog Bot"
          git config user.email "bot@donialabstech.online"
          git add blog/ sitemap.xml feed.xml
          git diff --quiet --cached || git commit -m "🔄 تحديث فهرس المدونة + Sitemap + RSS"
          git push
