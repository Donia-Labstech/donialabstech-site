name: Build Blog Manifest + RSS Feed

on:
  push:
    paths:
      - 'blog/*.html'
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build blog/index.json from blog/*.html
        run: python scripts/build_blog_manifest.py

      - name: Build feed.xml (RSS) from blog/index.json
        run: python scripts/build_rss_feed.py

      - name: Commit and push
        run: |
          git config user.name "DONIA Blog Bot"
          git config user.email "bot@donialabstech.online"
          git add blog/index.json feed.xml
          git diff --quiet --cached || git commit -m "🔄 تحديث فهرس المدونة + RSS Feed"
          git push
